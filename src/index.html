<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --bg-color: #121826;
            --panel-bg: #1e2638;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .main-chart {
            height: 320px;
            width: 100%;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .status-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .combined-current {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            grid-template-areas: "temp rose wind";
            align-items: center;
            gap: 20px;
        }

        .current-temp-section { grid-area: temp; }
        .current-wind-section { grid-area: wind; }
        .wind-rose-section {
            grid-area: rose;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.0rem;
        }

        .status-label {
            color: var(--text-muted);
        }

        .status-value {
            font-weight: bold;
        }

        .val-cyan {
            color: var(--accent-cyan);
        }

        .val-yellow {
            color: var(--accent-yellow);
        }

        .val-red {
            color: var(--accent-red);
        }

        .val-green {
            color: var(--accent-green);
        }

        .big-value {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
        }

        .wind-rose-container {
            position: relative;
            height: 220px;
            width: 220px;
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Compass styling */
        .compass {
            width: 200px;
            height: 200px;
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            position: relative;
            background: radial-gradient(circle, transparent 30%, rgba(255, 255, 255, 0.03) 70%);
        }

        .compass-label {
            position: absolute;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 0.9rem;
            transform: translate(-50%, -50%);
        }

        .compass-n {
            top: 10px;
            left: 50%;
        }

        .compass-e {
            top: 50%;
            left: calc(100% - 10px);
        }

        .compass-s {
            bottom: -10px;
            left: 50%;
        }

        .compass-w {
            top: 50%;
            left: 10px;
        }

        .wind-arrow {
            position: absolute;
            bottom: calc(36% - 37px);
            /* Offset by 15px so the 85px pivot sits exactly at the 50% center */
            left: 50%;
            width: var(--arrow-width, 36px);
            height: 130px;
            background-color: #fff;
            clip-path: polygon(50% 0%, 100% 100%, 50% 85%, 0% 100%);
            transform-origin: 50% 67px;
            transform: translateX(-50%) rotate(0deg);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            z-index: 5;
        }

        .wind-arrow-inner {
            position: absolute;
            top: 2px;
            width: calc(var(--arrow-width, 36px) - 4px);
            height: 126px;
            background-color: var(--arrow-color, #4ade80);
            clip-path: polygon(50% 0%, 100% 100%, 50% 85%, 0% 100%);
            transform-origin: 50% 67px;
            /* Inner pivot adjusted slightly for the 2px top offset and 96px height to match the outer 85px point visually */
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background-color: var(--text-main);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .map-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        #weather-map {
            height: 520px;
            width: 100%;
            border-radius: 8px;
            background-color: #0b0f1a;
        }

        .map-time {
            font-variant-numeric: tabular-nums;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .map-time.is-forecast {
            color: var(--accent-yellow);
        }

        .map-progress {
            position: relative;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .map-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--accent-cyan);
            width: 0%;
            transition: width 200ms linear;
        }

        .map-progress-now {
            position: absolute;
            top: -2px;
            bottom: -2px;
            width: 2px;
            background-color: rgba(255, 255, 255, 0.6);
        }

        .leaflet-container {
            background: #0b0f1a;
        }

        @media (max-width: 640px) {
            body { padding: 0; gap: 6px; }
            .dashboard-container { gap: 6px; }
            .panel { padding: 4px; border-radius: 0; border-left: none; border-right: none; }
            .main-chart { height: 240px; }
            .bottom-grid { grid-template-columns: 1fr; gap: 6px; }
            .big-value { font-size: 1.6rem; margin: 6px 0; }
            .status-row { font-size: 0.85rem; margin-bottom: 6px; }
            .status-header { font-size: 0.95rem; margin-bottom: 8px; padding-bottom: 6px; }
            .combined-current {
                grid-template-columns: 1fr auto;
                grid-template-areas:
                    "temp rose"
                    "wind rose";
                gap: 8px;
            }
            .wind-rose-container {
                height: 160px;
                width: 160px;
            }
            .compass {
                transform: scale(0.8);
                transform-origin: center center;
            }
            #weather-map { height: 360px; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Main Chart -->
        <div class="panel">
            <div class="main-chart">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <!-- Combined Current Conditions -->
        <div class="panel combined-current">
            <div class="current-temp-section status-box">
                <div class="status-header">Current Temperature</div>
                <div class="big-value val-cyan" id="cur-temp">--°C</div>
                <div class="status-row">
                    <span class="status-label">Indoor</span>
                    <span class="status-value val-yellow" id="cur-itemp">--°C</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Humidity</span>
                    <span class="status-value val-cyan" id="cur-humid">--%</span>
                </div>
            </div>

            <div class="wind-rose-section">
                <div class="wind-rose-container">
                    <div class="compass">
                        <canvas id="wind-heatmap" width="200" height="200"
                            style="position: absolute; top:0; left:0; width: 100%; height: 100%; border-radius: 50%; pointer-events: none; z-index: 1;"></canvas>
                        <div class="compass-label compass-n">N</div>
                        <div class="compass-label compass-e">E</div>
                        <div class="compass-label compass-s">S</div>
                        <div class="compass-label compass-w">W</div>
                        <div class="wind-arrow" id="wind-arrow">
                            <div class="wind-arrow-inner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="current-wind-section status-box">
                <div class="status-header">Current Wind</div>
                <div class="big-value val-yellow" id="cur-gust">-- km/h</div>
                <div class="status-row">
                    <span class="status-label">Average</span>
                    <span class="status-value val-green" id="cur-windspeed">-- km/h</span>
                </div>
                <div class="status-row">
                    <span class="status-label">Solar Rad</span>
                    <span class="status-value val-yellow" id="cur-solar">-- W/m²</span>
                </div>
            </div>
        </div>

        <!-- Weather Radar Map -->
        <div class="panel map-panel">
            <div class="map-header-row">
                <div class="status-header" style="margin: 0; padding: 0; border: none;">
                    Precipitation Radar — Austria
                </div>
                <div>
                    <span class="status-label">Frame:</span>
                    <span class="map-time" id="map-time">--:--</span>
                </div>
            </div>
            <div id="weather-map"></div>
            <div class="map-progress" id="map-progress">
                <div class="map-progress-bar" id="map-progress-bar"></div>
                <div class="map-progress-now" id="map-progress-now"></div>
            </div>
        </div>
    </div>

    <script>
        function movingAverage(data, window) {
            const half = Math.floor(window / 2);
            return data.map((_, i) => {
                const start = Math.max(0, i - half);
                const end = Math.min(data.length - 1, i + half);
                let sum = 0;
                for (let j = start; j <= end; j++) sum += data[j];
                return Math.round((sum / (end - start + 1)) * 10) / 10;
            });
        }

        const nowLinePlugin = {
            id: 'nowLine',
            afterDraw(chart) {
                const idx = chart.options.plugins?.nowLine?.index;
                if (idx == null) return;
                const meta = chart.getDatasetMeta(0);
                if (!meta || !meta.data[idx]) return;
                const x = meta.data[idx].x;
                const { top, bottom } = chart.chartArea;
                const ctx = chart.ctx;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, top);
                ctx.lineTo(x, bottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.setLineDash([5, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const label = 'Now';
                const tw = ctx.measureText(label).width;
                const pad = 4;
                const rw = tw + pad * 2, rh = 16, rx = x - rw / 2, ry = bottom - rh - 4, rr = 4;
                ctx.fillStyle = 'rgba(30, 38, 56, 0.85)';
                ctx.beginPath();
                ctx.roundRect(rx, ry, rw, rh, rr);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.fillText(label, x, ry + rh - 1);
                ctx.restore();
            }
        };

        const forecastBgPlugin = {
            id: 'forecastBg',
            beforeDatasetsDraw(chart) {
                const startIdx = chart.options.plugins?.forecastBg?.startIndex;
                if (startIdx == null) return;
                const meta = chart.getDatasetMeta(3); // Forecast Temp dataset
                const point = meta?.data[startIdx];
                if (!point) return;
                const { top, bottom, right } = chart.chartArea;
                const ctx = chart.ctx;
                ctx.save();
                ctx.fillStyle = 'rgba(99, 102, 241, 0.08)';
                ctx.fillRect(point.x, top, right - point.x, bottom - top);
                ctx.restore();
            }
        };

        const WIND_DIR_BAND_H = 20;
        const CLOUD_BAND_H = 20;
        const BAND_GAP = 2;
        const BANDS_TOTAL_H = WIND_DIR_BAND_H + BAND_GAP + CLOUD_BAND_H;

        function angDiffDeg(a, b) {
            const d = Math.abs(a - b) % 360;
            return d > 180 ? 360 - d : d;
        }

        function cardinalDir(deg) {
            const names = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                           'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const norm = ((deg % 360) + 360) % 360;
            return names[Math.round(norm / 22.5) % 16];
        }

        // Find indices where the wind direction stayed within a 30° range for
        // a 2-hour window (2-min sampling => 60 points). Returns label markers.
        function computeStableWindLabels(windDirData) {
            const WINDOW = 60;
            const RANGE_DEG = 30;
            const half = Math.floor(WINDOW / 2);
            const N = windDirData.length;
            const stable = new Array(N).fill(false);
            const meanAt = new Array(N).fill(0);

            for (let i = 0; i < N; i++) {
                const start = Math.max(0, i - half);
                const end = Math.min(N, i + half + 1);
                let sx = 0, sy = 0, n = 0;
                for (let j = start; j < end; j++) {
                    const d = windDirData[j];
                    if (d == null) continue;
                    const r = d * Math.PI / 180;
                    sx += Math.cos(r);
                    sy += Math.sin(r);
                    n++;
                }
                if (n < WINDOW * 0.8) continue;
                const mean = ((Math.atan2(sy, sx) * 180 / Math.PI) + 360) % 360;
                let maxDev = 0;
                for (let j = start; j < end; j++) {
                    const d = windDirData[j];
                    if (d == null) continue;
                    const dev = angDiffDeg(d, mean);
                    if (dev > maxDev) maxDev = dev;
                }
                if (maxDev <= RANGE_DEG / 2) {
                    stable[i] = true;
                    meanAt[i] = mean;
                }
            }

            const labels = [];
            let runStart = -1;
            for (let i = 0; i <= N; i++) {
                if (i < N && stable[i]) {
                    if (runStart < 0) runStart = i;
                } else if (runStart >= 0) {
                    const runEnd = i - 1;
                    if (runEnd - runStart + 1 >= WINDOW) {
                        const center = (runStart + runEnd) >> 1;
                        labels.push({ index: center, label: cardinalDir(meanAt[center]) });
                        for (let p = center - WINDOW; p >= runStart; p -= WINDOW)
                            labels.push({ index: p, label: cardinalDir(meanAt[p]) });
                        for (let p = center + WINDOW; p <= runEnd; p += WINDOW)
                            labels.push({ index: p, label: cardinalDir(meanAt[p]) });
                    }
                    runStart = -1;
                }
            }
            return labels;
        }

        const cloudCoverPlugin = {
            id: 'cloudCover',
            beforeDatasetsDraw(chart) {
                const cfg = chart.options.plugins?.cloudCover;
                if (!cfg?.data?.length) return;
                const meta = chart.getDatasetMeta(3);
                if (!meta) return;
                const { top } = chart.chartArea;
                const ctx = chart.ctx;
                ctx.save();
                ctx.fillStyle = 'rgba(148, 163, 184, 0.5)';
                const yBase = top - CLOUD_BAND_H;
                for (let i = 0; i < cfg.data.length; i++) {
                    const cloud = cfg.data[i];
                    if (cloud == null || cloud <= 0) continue;
                    const point = meta.data[cfg.startIndex + i];
                    if (!point) continue;
                    const nextPoint = meta.data[cfg.startIndex + i + 1];
                    const w = nextPoint ? nextPoint.x - point.x : 2;
                    ctx.fillRect(point.x, yBase, Math.max(w, 1), (cloud / 100) * CLOUD_BAND_H);
                }
                ctx.restore();
            }
        };

        const windDirectionPlugin = {
            id: 'windDirection',
            beforeDatasetsDraw(chart) {
                const cfg = chart.options.plugins?.windDirection;
                if (!cfg?.data?.length) return;
                const { top } = chart.chartArea;
                const xScale = chart.scales.x;
                if (!xScale) return;
                const ctx = chart.ctx;
                ctx.save();
                const yTop = top - BANDS_TOTAL_H;
                for (let i = 0; i < cfg.data.length; i++) {
                    const dir = cfg.data[i];
                    if (dir == null) continue;
                    const x0 = xScale.getPixelForValue(i);
                    const x1 = i + 1 < cfg.data.length ? xScale.getPixelForValue(i + 1) : x0 + 2;
                    const w = Math.max(x1 - x0, 1);
                    // Blend three colors by axis weight: blue (N), green (E/W), red (S)
                    const rad = dir * Math.PI / 180;
                    const c = Math.cos(rad);
                    const s = Math.sin(rad);
                    const wN = Math.max(0, c) ** 2;
                    const wS = Math.max(0, -c) ** 2;
                    const wEW = s * s;
                    const r = Math.round(56 * wN + 15 * wEW + 239 * wS);
                    const g = Math.round(189 * wN + 70 * wEW + 68 * wS);
                    const b = Math.round(248 * wN + 35 * wEW + 68 * wS);
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.55)`;
                    ctx.fillRect(x0, yTop, w, WIND_DIR_BAND_H);
                }
                ctx.restore();
            },
            afterDatasetsDraw(chart) {
                const labels = chart.options.plugins?.windDirection?.labels;
                if (!labels?.length) return;
                const xScale = chart.scales.x;
                if (!xScale) return;
                const { top } = chart.chartArea;
                const ctx = chart.ctx;
                ctx.save();
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const yMid = top - BANDS_TOTAL_H + WIND_DIR_BAND_H / 2;
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
                ctx.fillStyle = '#eab308';
                for (const { index, label } of labels) {
                    const x = xScale.getPixelForValue(index);
                    ctx.strokeText(label, x, yMid);
                    ctx.fillText(label, x, yMid);
                }
                ctx.restore();
            }
        };

        const weatherIconPlugin = {
            id: 'weatherIcons',
            afterDraw(chart) {
                const icons = chart.options.plugins?.weatherIcons?.data;
                if (!icons?.length) return;
                const meta = chart.getDatasetMeta(3);
                if (!meta) return;
                const { top } = chart.chartArea;
                const ctx = chart.ctx;
                ctx.save();
                ctx.font = '15px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                for (const { index, icon } of icons) {
                    const point = meta.data[index];
                    if (!point) continue;
                    ctx.fillText(icon, point.x, top + 4);
                }
                ctx.restore();
            }
        };

        let historyChart = null;

        // ---------- Weather radar map (RainViewer) ----------
        // RainViewer's free public API exposes ~2 hours of past radar frames at
        // 10-minute intervals plus a short nowcast. Frames are 256px tiles served
        // from a per-frame path. Docs: https://www.rainviewer.com/api.html
        const RAINVIEWER_API = 'https://api.rainviewer.com/public/weather-maps.json';
        const FRAME_INTERVAL_MS = 500;   // time between frames during animation
        const HOLD_LATEST_MS = 3000;     // pause on the latest observed frame
        // Re-fetch the RainViewer manifest every 5 min. New past frames are
        // published every ~10 min; this ensures we pick them up promptly and
        // restart the loop from frame 0 with the refreshed tile set.
        const FRAMES_REFRESH_MS = 5 * 60 * 1000;

        // Default station location — overridden by /config (LAT/LON env vars).
        const DEFAULT_STATION = { lat: 48.221059, lon: 15.768487 };
        const MAP_ZOOM = 7; // RainViewer's free tiles cap at zoom 7

        // Higher-resolution Austria outline (~545 points) is served from the
        // backend's /austria.geojson endpoint (embedded at compile time).
        // Source: georgique/world-geojson.

        const radarState = {
            map: null,
            host: null,
            frames: [],          // [{ path, time, kind }] kind = 'past' | 'nowcast'
            latestPastIdx: -1,   // index of the most recent observed (non-forecast) frame
            layers: [],          // Leaflet layers, parallel to frames
            currentIdx: -1,
            timer: null,
            paused: false,
        };

        function initRadarMap(center) {
            if (radarState.map) return;
            radarState.map = L.map('weather-map', {
                zoomControl: true,
                attributionControl: true,
                preferCanvas: true,
            }).setView([center.lat, center.lon], MAP_ZOOM);

            // CartoDB "Dark Matter (no labels)" — dark base map without place names.
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 12,
                minZoom: 5,
                subdomains: 'abcd',
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a> &middot; Radar &copy; <a href="https://www.rainviewer.com/">RainViewer</a>',
            }).addTo(radarState.map);

            // Austria outline drawn above the radar layer (overlayPane > tilePane).
            fetch('/austria.geojson')
                .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
                .then(geo => {
                    L.geoJSON(geo, {
                        style: {
                            color: '#f1f5f9',
                            weight: 2,
                            opacity: 0.9,
                            fill: false,
                            interactive: false,
                        },
                    }).addTo(radarState.map);
                })
                .catch(err => console.warn('Austria outline failed to load:', err));

            // CircleMarker (rather than the default pin) so we can color it
            // with the dashboard's accent green without shipping marker assets.
            L.circleMarker([center.lat, center.lon], {
                radius: 7,
                color: '#ffffff',
                weight: 2,
                fillColor: '#22c55e',
                fillOpacity: 1,
            })
                .addTo(radarState.map)
                .bindTooltip('Weather station', { direction: 'top', offset: [0, -8] });
        }

        function buildFrameLayer(host, frame) {
            // RainViewer tile URL: {host}{path}/{size}/{z}/{x}/{y}/{color}/{options}.png
            // size=256, color=2 (universal blue/green/yellow/red), options "1_1" = smooth+snow
            const url = `${host}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;
            return L.tileLayer(url, {
                tileSize: 256,
                opacity: 0,         // shown only when its turn comes up
                zIndex: 50,
                // Note: crossOrigin is intentionally omitted. RainViewer's tile
                // servers don't reliably send CORS headers, and we only display
                // the tiles (no canvas pixel reads), so CORS isn't needed.
            });
        }

        function formatFrameTime(unixSeconds) {
            const d = new Date(unixSeconds * 1000);
            return new Intl.DateTimeFormat('en-GB', {
                hour: '2-digit', minute: '2-digit',
                timeZone: 'Europe/Vienna',
            }).format(d);
        }

        function showFrame(idx) {
            const { frames, layers, map } = radarState;
            if (!frames.length || !map) return;

            for (let i = 0; i < layers.length; i++) {
                if (i === idx) layers[i].setOpacity(0.75);
                else layers[i].setOpacity(0);
            }

            radarState.currentIdx = idx;
            const frame = frames[idx];
            const timeEl = document.getElementById('map-time');
            const progEl = document.getElementById('map-progress-bar');
            if (timeEl) {
                timeEl.textContent = formatFrameTime(frame.time);
                timeEl.classList.toggle('is-forecast', frame.kind === 'nowcast');
            }
            if (progEl) {
                const pct = ((idx + 1) / frames.length) * 100;
                progEl.style.width = `${pct}%`;
            }
        }

        function positionNowMarker() {
            const nowEl = document.getElementById('map-progress-now');
            if (!nowEl || !radarState.frames.length) return;
            // Marker sits at the boundary between past and nowcast frames.
            const boundary = radarState.latestPastIdx + 1;
            const pct = (boundary / radarState.frames.length) * 100;
            nowEl.style.left = `${pct}%`;
        }

        function scheduleNextFrame() {
            clearTimeout(radarState.timer);
            if (radarState.paused || !radarState.frames.length) return;

            const isLatestObserved = radarState.currentIdx === radarState.latestPastIdx;
            const isLastFrame = radarState.currentIdx === radarState.frames.length - 1;
            const delay = (isLatestObserved || isLastFrame) ? HOLD_LATEST_MS : FRAME_INTERVAL_MS;

            radarState.timer = setTimeout(() => {
                let next = radarState.currentIdx + 1;
                if (next >= radarState.frames.length) next = 0;
                showFrame(next);
                scheduleNextFrame();
            }, delay);
        }

        async function loadRadarFrames() {
            try {
                const resp = await fetch(RAINVIEWER_API);
                if (!resp.ok) throw new Error(`RainViewer HTTP ${resp.status}`);
                const data = await resp.json();
                const host = data.host;
                const past = (data.radar?.past || []).map(f => ({ ...f, kind: 'past' }));
                const nowcast = (data.radar?.nowcast || []).map(f => ({ ...f, kind: 'nowcast' }));
                const frames = [...past, ...nowcast];
                if (!frames.length) return;

                // Tear down old layers if any
                for (const layer of radarState.layers) {
                    radarState.map.removeLayer(layer);
                }

                radarState.host = host;
                radarState.frames = frames;
                radarState.latestPastIdx = past.length - 1;
                radarState.layers = frames.map(f => buildFrameLayer(host, f).addTo(radarState.map));

                positionNowMarker();
                showFrame(0);
                scheduleNextFrame();
            } catch (err) {
                console.warn('Radar frame load failed:', err);
            }
        }

        async function fetchStationLocation() {
            try {
                const resp = await fetch('/config');
                if (!resp.ok) throw new Error(`config HTTP ${resp.status}`);
                const cfg = await resp.json();
                if (typeof cfg.lat === 'number' && typeof cfg.lon === 'number') {
                    return { lat: cfg.lat, lon: cfg.lon };
                }
            } catch (err) {
                console.warn('Falling back to default station location:', err);
            }
            return DEFAULT_STATION;
        }

        async function startRadar() {
            const center = await fetchStationLocation();
            initRadarMap(center);
            loadRadarFrames();
            setInterval(loadRadarFrames, FRAMES_REFRESH_MS);

            // Pause animation while the tab is hidden to avoid wasted requests.
            document.addEventListener('visibilitychange', () => {
                radarState.paused = document.hidden;
                if (!radarState.paused) scheduleNextFrame();
                else clearTimeout(radarState.timer);
            });
        }
        // ---------- end radar map ----------

        function updateWindHeatmap(winddirs) {
            const canvas = document.getElementById('wind-heatmap');
            if (canvas && winddirs && winddirs.length > 0) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Only use last 15 minutes of data (assuming 2 min per entry)
                const entriesPerMinute = 2; // 2 entries per minute
                const numEntries = Math.floor(15 * entriesPerMinute); // 30 entries
                const lastWinddirs = winddirs.slice(-numEntries);

                const numBins = 72;
                const binSize = 360 / numBins;
                const bins = new Array(numBins).fill(0);
                for (let dir of lastWinddirs) {
                    let bin = Math.floor((dir + binSize / 2) / binSize) % numBins;
                    if (bin < 0) bin += numBins;
                    bins[bin]++;
                }

                let maxFreq = Math.max(...bins);
                if (maxFreq === 0) maxFreq = 1;

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const innerRadius = 86;
                const outerRadius = 96;
                ctx.lineWidth = outerRadius - innerRadius;

                for (let i = 0; i < numBins; i++) {
                    if (bins[i] > 0) {
                        let startAngle = (i * binSize - binSize / 2.2 - 90) * Math.PI / 180;
                        let endAngle = (i * binSize + binSize / 2.2 - 90) * Math.PI / 180;

                        let intensity = bins[i] / maxFreq;

                        let r, g, b;
                        if (intensity < 0.5) {
                            let map = intensity * 2;
                            r = Math.round(6 + (234 - 6) * map);
                            g = Math.round(182 + (179 - 182) * map);
                            b = Math.round(212 + (8 - 212) * map);
                        } else {
                            let map = (intensity - 0.5) * 2;
                            r = Math.round(234 + (239 - 234) * map);
                            g = Math.round(179 + (68 - 179) * map);
                            b = Math.round(8 + (68 - 8) * map);
                        }

                        let a = 0.2 + 0.8 * intensity;

                        ctx.beginPath();
                        ctx.arc(centerX, centerY, (innerRadius + outerRadius) / 2, startAngle, endAngle);
                        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
                        ctx.stroke();
                    }
                }
            }
        }

        function updateWindRose(direction, gustkmh) {
            const arrow = document.getElementById('wind-arrow');
            const arrowInner = document.querySelector('.wind-arrow-inner');

            if (arrow && arrowInner) {
                arrow.style.transform = `translateX(-50%) rotate(${direction}deg)`;

                let thickness = 36;
                let color = '#4ade80';

                if (gustkmh < 3) {
                    thickness = 20;
                    color = 'rgb(150, 150, 150)';
                } else if (gustkmh <= 6) {
                    thickness = 25;
                    color = 'rgb(80, 220, 100)';
                } else if (gustkmh < 20) {
                    thickness = 30;
                    color = 'rgb(170, 220, 50)';
                } else if (gustkmh < 25) {
                    thickness = 35;
                    color = 'rgb(240, 180, 50)';
                } else if (gustkmh < 30) {
                    thickness = 40;
                    color = 'rgb(255, 120, 50)';
                } else {
                    thickness = 45;
                    color = 'rgb(255, 50, 50)';
                }

                arrow.style.setProperty('--arrow-width', `${thickness}px`);
                arrowInner.style.setProperty('--arrow-width', `${thickness}px`);
                arrowInner.style.setProperty('--arrow-color', color);
            }
        }

        function buildScales(mobile) {
            const hideAxis = mobile
                ? { ticks: { display: false }, title: { display: false }, border: { display: false }, afterFit(axis) { axis.width = 0; } }
                : {};
            return {
                x: {
                    grid: { color: '#334155', drawBorder: false },
                    ticks: { maxTicksLimit: mobile ? 4 : 10 }
                },
                y: {
                    type: 'linear',
                    position: 'left',
                    title: { display: true, text: 'Temperature (°C)' },
                    grid: { color: '#334155', drawBorder: false },
                    ticks: { maxTicksLimit: 8 },
                    ...hideAxis
                },
                y1: {
                    type: 'linear',
                    position: 'right',
                    min: 0,
                    title: { display: true, text: 'Wind Speed (km/h)' },
                    grid: { drawOnChartArea: false },
                    ticks: { maxTicksLimit: 8 },
                    ...hideAxis
                },
                y3: {
                    type: 'linear',
                    position: 'right',
                    title: { display: true, text: 'Rain (mm)' },
                    grid: { drawOnChartArea: false },
                    ticks: { maxTicksLimit: 8 },
                    ...hideAxis
                }
            };
        }

        async function fetchAndUpdateData() {
            try {
                const response = await fetch('/query');
                const data = await response.json();

                // Update live text boxes
                document.getElementById('cur-temp').innerText = `${data.curtemperature.toFixed(1)}°C`;
                document.getElementById('cur-itemp').innerText = `${data.curtemperatureindoor.toFixed(1)}°C`;
                document.getElementById('cur-humid').innerText = `${data.curhumidity.toFixed(1)}%`;

                document.getElementById('cur-windspeed').innerText = `${data.curwindspeed.toFixed(1)} km/h`;
                document.getElementById('cur-gust').innerText = `${data.curwindgust.toFixed(1)} km/h`;
                document.getElementById('cur-solar').innerText = `${data.cursolarradiation.toFixed(0)} W/m²`;

                updateWindRose(data.curwinddir, data.curwindgust);
                updateWindHeatmap(data.winddirs);

                // Build historical time labels (2 min per point)
                const numPoints = data.temperature.length;
                const labels = [];
                const latestTime = new Date(data.time);

                const dateFormatter = new Intl.DateTimeFormat('en-GB', {
                    timeStyle: 'short',
                    timeZone: 'Europe/Paris'
                });

                for (let i = 0; i < numPoints; i++) {
                    const pointDate = new Date(latestTime.getTime() - ((numPoints - 1 - i) * 2 * 60000));
                    const snapped = new Date(Math.round(pointDate.getTime() / 3600000) * 3600000);
                    labels.push(dateFormatter.format(snapped));
                }

                // Fetch forecast data (best-effort, chart still works without it).
                // We generate 2×numPoints forecast slots so forecast takes 2/3 of the
                // chart width and history takes 1/3, stepping at the same 2-min interval.
                const intervalMs = 2 * 60 * 1000;
                const forecastLabels = [];
                const forecastTemp = [], forecastWind = [], forecastGusts = [], forecastPrecip = [], forecastCloud = [], forecastWindDir = [];

                try {
                    const forecastResponse = await fetch('/forecast');
                    if (forecastResponse.ok) {
                        const forecastData = await forecastResponse.json();
                        if (forecastData && forecastData.hourly) {
                            // Build a map keyed by UTC hour timestamp.
                            // Open-Meteo returns times like "2024-01-15T14:00" with
                            // timezone=UTC, so append 'Z' to force UTC parsing.
                            const hourly = forecastData.hourly;
                            const fcByHour = {};
                            for (let j = 0; j < hourly.time.length; j++) {
                                const t = new Date(hourly.time[j] + 'Z');
                                fcByHour[t.getTime()] = {
                                    temp:   hourly.temperature_2m[j],
                                    wind:   hourly.wind_speed_10m[j],
                                    gusts:  hourly.wind_gusts_10m[j],
                                    precip: hourly.precipitation[j],
                                    cloud:  hourly.cloud_cover[j],
                                    dir:    hourly.wind_direction_10m[j],
                                };
                            }

                            // Step forward 2×numPoints × 2 min from latestTime, looking up
                            // each 2-min slot's UTC hour in the forecast map.
                            for (let i = 0; i < numPoints * 2; i++) {
                                const futureTime = new Date(latestTime.getTime() + (i + 1) * intervalMs);
                                const snapped = new Date(Math.round(futureTime.getTime() / 3600000) * 3600000);
                                forecastLabels.push(dateFormatter.format(snapped));

                                const hourFloor = new Date(futureTime);
                                hourFloor.setUTCMinutes(0, 0, 0);
                                const fc = fcByHour[hourFloor.getTime()];
                                forecastTemp.push(fc !== undefined  ? fc.temp   : null);
                                forecastWind.push(fc !== undefined  ? fc.wind   : null);
                                forecastGusts.push(fc !== undefined ? fc.gusts  : null);
                                forecastPrecip.push(fc !== undefined ? fc.precip : null);
                                forecastCloud.push(fc !== undefined ? fc.cloud  : null);
                                forecastWindDir.push(fc !== undefined ? fc.dir : null);
                            }
                        }
                    }
                } catch (e) {
                    console.warn("Forecast data unavailable:", e);
                }

                // Drop trailing slots where the forecast API returned no data
                while (forecastLabels.length > 0 && forecastTemp[forecastLabels.length - 1] === null) {
                    forecastLabels.pop(); forecastTemp.pop(); forecastWind.pop();
                    forecastGusts.pop(); forecastPrecip.pop(); forecastCloud.pop();
                    forecastWindDir.pop();
                }

                const windDirData = [...(data.winddirs || []), ...forecastWindDir];
                const windDirLabels = computeStableWindLabels(windDirData);

                // Rain/snow icons only; cloud coverage shown as a gray band
                const weatherIconData = [];
                let prevIcon = null;
                for (let i = 0; i < forecastLabels.length; i += 30) {
                    const precip = forecastPrecip[i] ?? 0;
                    const temp   = forecastTemp[i]   ?? 10;
                    let icon = null;
                    if      (precip >= 0.5 && temp <= 2) icon = '❄️';
                    else if (precip >= 0.5)              icon = '🌧️';
                    if (icon && icon !== prevIcon) {
                        weatherIconData.push({ index: labels.length + i, icon });
                    }
                    prevIcon = icon;
                }

                const allLabels = [...labels, ...forecastLabels];
                const histNulls = new Array(forecastLabels.length).fill(null);
                const fcstNulls = new Array(labels.length).fill(null);

                const smoothedTemp = movingAverage(data.temperature, 7);
                const smoothedWind = movingAverage(data.windgusts, 7);

                const chartData = {
                    labels: allLabels,
                    datasets: [
                        {
                            label: 'Temperature (°C)',
                            data: [...smoothedTemp, ...histNulls],
                            borderColor: '#22c55e',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            yAxisID: 'y',
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Wind Speed (km/h)',
                            data: [...smoothedWind, ...histNulls],
                            borderColor: '#eab308',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            yAxisID: 'y1',
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Rain (mm)',
                            type: 'bar',
                            data: [...data.rain, ...histNulls],
                            backgroundColor: 'rgba(59, 130, 246, 0.55)',
                            borderWidth: 0,
                            yAxisID: 'y3',
                            barPercentage: 1.0,
                            categoryPercentage: 1.0,
                        },
                        {
                            label: 'Forecast Temp (°C)',
                            data: [...fcstNulls, ...forecastTemp],
                            borderColor: '#22c55e',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [4, 4],
                            yAxisID: 'y',
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Forecast Gusts (km/h)',
                            data: [...fcstNulls, ...forecastGusts],
                            borderColor: '#eab308',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [4, 4],
                            yAxisID: 'y1',
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Forecast Precip (mm)',
                            type: 'bar',
                            data: [...fcstNulls, ...forecastPrecip],
                            backgroundColor: 'rgba(59, 130, 246, 0.35)',
                            borderWidth: 0,
                            yAxisID: 'y3',
                            barPercentage: 1.0,
                            categoryPercentage: 1.0,
                        }
                    ]
                };

                const nowIndex = labels.length - 1;
                const isMobile = window.innerWidth < 640;

                // Recreate chart when mobile state changes so scales rebuild
                if (historyChart && historyChart._wasMobile !== isMobile) {
                    historyChart.destroy();
                    historyChart = null;
                }

                if (!historyChart) {
                    const ctx = document.getElementById('historyChart').getContext('2d');
                    Chart.defaults.color = '#94a3b8';
                    historyChart = new Chart(ctx, {
                        type: 'line',
                        data: chartData,
                        plugins: [forecastBgPlugin, windDirectionPlugin, cloudCoverPlugin, nowLinePlugin, weatherIconPlugin],
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: isMobile
                                ? { mode: null, intersect: true }
                                : { mode: 'index', intersect: false },
                            events: isMobile ? [] : undefined,
                            plugins: {
                                nowLine:      { index: nowIndex },
                                forecastBg:   { startIndex: labels.length },
                                cloudCover:   { data: forecastCloud, startIndex: labels.length },
                                windDirection: { data: windDirData, labels: windDirLabels },
                                weatherIcons: { data: weatherIconData },
                                tooltip: { enabled: !isMobile },
                                title: {
                                    display: true,
                                    text: '',
                                    position: 'top',
                                    weight: 500,
                                    padding: { top: 0, bottom: BANDS_TOTAL_H },
                                    font: { size: 0 }
                                },
                                legend: {
                                    position: 'top',
                                    labels: isMobile ? {
                                        filter: (item) => ['Temperature (°C)', 'Wind Speed (km/h)'].includes(item.text),
                                        usePointStyle: true,
                                        padding: 12
                                    } : {
                                        filter: (item) => !['Forecast Temp (°C)', 'Forecast Gusts (km/h)', 'Forecast Precip (mm)'].includes(item.text),
                                        usePointStyle: true,
                                        padding: 20,
                                        generateLabels: (chart) => {
                                            const items = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                            items.push({
                                                text: 'Cloud Cover',
                                                fillStyle: 'rgba(148, 163, 184, 0.5)',
                                                strokeStyle: 'rgba(148, 163, 184, 0.5)',
                                                lineWidth: 0,
                                                hidden: false,
                                                pointStyle: 'rect'
                                            });
                                            items.push({
                                                text: 'Wind N',
                                                fillStyle: 'rgba(56, 189, 248, 0.55)',
                                                strokeStyle: 'rgba(56, 189, 248, 0.55)',
                                                lineWidth: 0,
                                                hidden: false,
                                                pointStyle: 'rect'
                                            });
                                            items.push({
                                                text: 'Wind E/W',
                                                fillStyle: 'rgba(15, 70, 35, 0.55)',
                                                strokeStyle: 'rgba(15, 70, 35, 0.55)',
                                                lineWidth: 0,
                                                hidden: false,
                                                pointStyle: 'rect'
                                            });
                                            items.push({
                                                text: 'Wind S',
                                                fillStyle: 'rgba(239, 68, 68, 0.55)',
                                                strokeStyle: 'rgba(239, 68, 68, 0.55)',
                                                lineWidth: 0,
                                                hidden: false,
                                                pointStyle: 'rect'
                                            });
                                            return items;
                                        }
                                    }
                                }
                            },
                            scales: buildScales(isMobile)
                        }
                    });
                    historyChart._wasMobile = isMobile;
                } else {
                    historyChart.data = chartData;
                    historyChart.options.plugins.nowLine.index = nowIndex;
                    historyChart.options.plugins.forecastBg.startIndex = labels.length;
                    historyChart.options.plugins.cloudCover = { data: forecastCloud, startIndex: labels.length };
                    historyChart.options.plugins.windDirection = { data: windDirData, labels: windDirLabels };
                    historyChart.options.plugins.weatherIcons.data = weatherIconData;
                    historyChart.update('none');
                }
            } catch (err) {
                console.error("Failed to fetch weather data", err);
            }
        }

        // Initial fetch
        fetchAndUpdateData();

        // Refresh every 30 seconds
        setInterval(fetchAndUpdateData, 30000);

        // Boot the radar map (independent of the chart refresh loop)
        startRadar();
    </script>
</body>
